<!doctype html>
<html lang="en">
  <head>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('hifz-theme') || 'desert'
          if (t === 'midnight') t = 'desert'
          if (t === 'scribe') t = 'desert'
          document.documentElement.dataset.theme = t
          document.documentElement.classList.toggle('dark', t === 'library' || t === 'cedar')
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0e7490" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hifz Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
